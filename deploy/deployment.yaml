apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-api
  namespace: payments
  labels:
    app: ledger-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ledger-api
  template:
    metadata:
      labels:
        app: ledger-api
    spec:
      serviceAccountName: ledger-api-sa

      containers:
        - name: ledger-api
          image: prajwaldevops1027/ledger-api:v2
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080
          envFrom:
          - configMapRef:
              name: ledger-api-config
          - secretRef:
              name: ledger-api-secret
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          livenessProbe:
            httpGet:
              path: /health
              port: 8080

          readinessProbe:
            httpGet:
              path: /health
              port: 8080
