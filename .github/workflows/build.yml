name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Syntax
        run: |
          python -m py_compile app.py

      - name: Build Docker Image
        run: |
          docker build -t prajwaldevops1027/ledger-api:v2 .

      ####################################################
      # Install Security Tools
      ####################################################
      - name: Install Semgrep
        run: |
          pip install semgrep

      - name: Install Gitleaks
        working-directory: .
        run: |
          wget https://github.com/gitleaks/gitleaks/releases/latest/download/gitleaks_linux_x64.tar.gz
          tar -xzf gitleaks_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Install Trivy
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      ####################################################
      # Create Reports Folder
      ####################################################
      - name: Create Reports Folder
        working-directory: .
        run: |
          mkdir -p reports

      ####################################################
      # Semgrep Scan
      ####################################################
      - name: Run Semgrep
        working-directory: .
        continue-on-error: true
        run: |
          semgrep --config auto . \
          --json \
          --output reports/semgrep.json

      ####################################################
      # Gitleaks Scan
      ####################################################
      - name: Run Gitleaks
        working-directory: .
        continue-on-error: true
        run: |
          gitleaks detect \
          --report-format json \
          --report-path reports/gitleaks.json

      ####################################################
      # Trivy Filesystem
      ####################################################
      - name: Run Trivy Filesystem Scan
        working-directory: .
        continue-on-error: true
        run: |
          trivy fs app \
          --severity HIGH,CRITICAL \
          --format table \
          > reports/trivy-fs.txt

      ####################################################
      # Trivy Image
      ####################################################
      - name: Run Trivy Image Scan
        working-directory: .
        continue-on-error: true
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          --format table \
          prajwaldevops1027/ledger-api:v2 \
          > reports/trivy-image.txt

      ####################################################
      # Upload Reports
      ####################################################
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: reports/

      ####################################################
      # Docker Login
      ####################################################
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ####################################################
      # Push Image
      ####################################################
      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:v2

      ####################################################
      # Update Manifest
      ####################################################
      - name: Update Deployment Manifest
        working-directory: .
        run: |
          sed -i 's|image:.*|image: prajwaldevops1027/ledger-api:v2|g' deploy/deployment.yaml

      ####################################################
      # Commit Manifest
      ####################################################
      - name: Commit Manifest Changes
        working-directory: .
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add deploy/deployment.yaml

          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image to v2"
            git push origin main
          else
            echo "No changes detected"
          fi

      ####################################################
      # Email Reports
      ####################################################
      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "DevSecOps CI/CD Pipeline Report"
          to: prajwalint1027@gmail.com
          from: GitHub Actions
          body: |
            Hello,

            The DevSecOps pipeline has completed.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}
            Workflow: ${{ github.workflow }}
            Run Number: ${{ github.run_number }}

            Security Scans Executed:
            ✔ Semgrep
            ✔ Gitleaks
            ✔ Trivy Filesystem
            ✔ Trivy Docker Image

            Docker Image:
            prajwaldevops1027/ledger-api:v2

            Regards,
            GitHub Actions

          attachments: |
            reports/semgrep.json
            reports/gitleaks.json
            reports/trivy-fs.txt
            reports/trivy-image.txt
