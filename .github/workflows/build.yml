name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Application
        run: |
          python -m py_compile app.py

      - name: Build Docker Image
        run: |
          docker build -t ledger-api:latest .

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag ledger-api:latest prajwaldevops1027/ledger-api:${{ github.sha }}

      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:${{ github.sha }}
