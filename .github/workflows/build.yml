name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Application
        run: |
          python -m py_compile app.py

      - name: Build Docker Image
        run: |
          docker build -t prajwaldevops1027/ledger-api:v2 .

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit
        continue-on-error: true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: app
          format: table
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: prajwaldevops1027/ledger-api:v2
          format: table
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:v2

      - name: Update Kubernetes Manifest
        working-directory: .
        run: |
          sed -i 's|image:.*|image: prajwaldevops1027/ledger-api:v2|g' deploy/deployment.yaml

      - name: Commit Updated Manifest
        working-directory: .
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add deploy/deployment.yaml

          git diff --cached --quiet || git commit -m "Update image to v2"

      - name: Push Manifest
        working-directory: .
        run: |
          git push origin main

      - name: Pipeline Completed
        run: |
          echo "======================================="
          echo "Checkout Completed"
          echo "Dependencies Installed"
          echo "Application Verified"
          echo "Docker Image Built"
          echo "Semgrep Completed"
          echo "Gitleaks Completed"
          echo "Trivy Filesystem Scan Completed"
          echo "Trivy Image Scan Completed"
          echo "Docker Image Pushed"
          echo "Kubernetes Manifest Updated"
          echo "ArgoCD will Auto Sync"
          echo "======================================="
