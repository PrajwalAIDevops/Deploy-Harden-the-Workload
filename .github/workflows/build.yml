name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Syntax
        run: |
          python -m py_compile app.py

      - name: Build Docker Image
        run: |
          docker build -t prajwaldevops1027/ledger-api:v2 .

      - name: Run Semgrep
        uses: semgrep/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: app
          format: table
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Run Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: prajwaldevops1027/ledger-api:v2
          format: table
          severity: HIGH,CRITICAL
        continue-on-error: true

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:v2

      - name: Update Deployment Manifest
        working-directory: .
        run: |
          sed -i 's|image:.*|image: prajwaldevops1027/ledger-api:v2|g' deploy/deployment.yaml

      - name: Commit Manifest Changes
        working-directory: .
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add deploy/deployment.yaml

          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image to v2"
            git push origin main
          else
            echo "No changes detected"
          fi
