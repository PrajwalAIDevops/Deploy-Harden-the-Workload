name: DevSecOps CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Python Syntax
        run: |
          python -m py_compile app.py

      - name: Build Docker Image
        run: |
          docker build -t prajwaldevops1027/ledger-api:v2 .

      ####################################################
      # Install Security Tools & Formatters
      ####################################################
      - name: Install Semgrep
        run: |
          pip install semgrep

      - name: Install Gitleaks
        run: |
          VERSION=8.24.2
          wget https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz
          tar -xzf gitleaks_${VERSION}_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Install Trivy
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | \
          gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null

          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | \
          sudo tee /etc/apt/sources.list.d/trivy.list

          sudo apt-get update
          sudo apt-get install -y trivy

      ####################################################
      # Create Reports Folder
      ####################################################
      - name: Create Reports Folder
        working-directory: .
        run: |
          mkdir -p reports

      ####################################################
      # Semgrep Scan (HTML Output)
      ####################################################
      - name: Run Semgrep
        working-directory: .
        continue-on-error: true
        run: |
          semgrep --config auto . \
          --html \
          --output reports/semgrep.html

      ####################################################
      # Gitleaks Scan (JSON converted to clean Text HTML)
      ####################################################
      - name: Run Gitleaks
        working-directory: .
        continue-on-error: true
        run: |
          gitleaks detect \
          --report-format json \
          --report-path reports/gitleaks-raw.json
          
          echo "<html><body style='font-family:sans-serif; padding:20px;'><h1>Gitleaks Report</h1><pre style='background:#f4f4f4; padding:15px; border-radius:5px;'>" > reports/gitleaks.html
          if [ -s reports/gitleaks-raw.json ]; then
            cat reports/gitleaks-raw.json >> reports/gitleaks.html
          else
            echo "No leaks found! Repository is clean." >> reports/gitleaks.html
          fi
          echo "</pre></body></html>" >> reports/gitleaks.html

      ####################################################
      # Trivy Filesystem (HTML Output)
      ####################################################
      - name: Run Trivy Filesystem Scan
        working-directory: .
        continue-on-error: true
        run: |
          trivy fs app \
          --severity HIGH,CRITICAL \
          --format html \
          > reports/trivy-fs.html

      ####################################################
      # Trivy Image (HTML Output)
      ####################################################
      - name: Run Trivy Image Scan
        working-directory: .
        continue-on-error: true
        run: |
          trivy image \
          --severity HIGH,CRITICAL \
          --format html \
          prajwaldevops1027/ledger-api:v2 \
          > reports/trivy-image.html

      ####################################################
      # Publish Reports to GitHub Pages for instant web viewing
      ####################################################
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      ####################################################
      # Docker Login
      ####################################################
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      ####################################################
      # Push Image
      ####################################################
      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:v2

      ####################################################
      # Update Manifest
      ####################################################
      - name: Update Deployment Manifest
        working-directory: .
        run: |
          sed -i 's|image:.*|image: prajwaldevops1027/ledger-api:v2|g' deploy/deployment.yaml

      ####################################################
      # Commit Manifest
      ####################################################
      - name: Commit Manifest Changes
        working-directory: .
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add deploy/deployment.yaml

          if ! git diff --cached --quiet; then
            git commit -m "Update deployment image to v2"
            git push origin main
          else
            echo "No changes detected"
          fi

      ####################################################
      # Email Reports with Instant Web Links
      ####################################################
      - name: Send Email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Task - 2 Pipeline Running - Prajwal"
          to: prajwalint1027@gmail.com
          from: GitHub Actions
          html_body: |
            <p>Hello,</p>
            <p>The DevSecOps pipeline build has successfully completed.</p>
            
            <p style="font-size: 15px; background-color: #f8f9fa; padding: 15px; border-left: 5px solid #28a745; border-radius: 4px; line-height: 1.6;">
              <strong>⚡ Instant Web Links for HR (Click to Open in Browser):</strong><br>
              ▪️ <a href="${{ steps.deployment.outputs.page_url }}semgrep.html" style="color: #007bff; font-weight: bold; text-decoration: none;" target="_blank">View Semgrep Code Scan Report</a><br>
              ▪️ <a href="${{ steps.deployment.outputs.page_url }}gitleaks.html" style="color: #007bff; font-weight: bold; text-decoration: none;" target="_blank">View Gitleaks Secrets Scan Report</a><br>
              ▪️ <a href="${{ steps.deployment.outputs.page_url }}trivy-fs.html" style="color: #007bff; font-weight: bold; text-decoration: none;" target="_blank">View Trivy Filesystem Scan Report</a><br>
              ▪️ <a href="${{ steps.deployment.outputs.page_url }}trivy-image.html" style="color: #007bff; font-weight: bold; text-decoration: none;" target="_blank">View Trivy Container Image Report</a>
            </p>
            
            <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">
            
            <ul>
              <li><strong>Candidate Name:</strong> Prajwal</li>
              <li><strong>Role Applied:</strong> Junior DevOps Engineer</li>
              <li><strong>Repository:</strong> <a href="https://github.com/${{ github.repository }}">${{ github.repository }}</a></li>
              <li><strong>Branch:</strong> ${{ github.ref_name }}</li>
              <li><strong>Commit:</strong> <a href="https://github.com/${{ github.repository }}/commit/${{ github.sha }}">${{ github.sha }}</a></li>
            </ul>
            
            <br>
            <p>Regards,<br>
            <strong>Prajwal</strong><br>
            Junior DevOps Engineer</p>
