name: DevSecOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout Source Code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2 - Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3 - Install Application Dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4 - Verify Application
      - name: Verify Flask Application
        run: |
          python -m py_compile app.py

      # Step 5 - Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ledger-api:${{ github.sha }} .

      # Step 6 - Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 7 - Tag Docker Image
      - name: Tag Image
        run: |
          docker tag ledger-api:${{ github.sha }} prajwaldevops1027/ledger-api:${{ github.sha }}

      # Step 8 - Push Docker Image
      - name: Push Docker Image
        run: |
          docker push prajwaldevops1027/ledger-api:${{ github.sha }}
