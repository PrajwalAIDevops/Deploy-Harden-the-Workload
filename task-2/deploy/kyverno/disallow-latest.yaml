apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce
  background: true

  rules:
    - name: no-latest

      match:
        any:
        - resources:
            kinds:
            - Pod

      validate:
        message: "Using ':latest' image tag is not allowed."

        foreach:
        - list: "request.object.spec.containers"

          deny:
            conditions:
              any:
              - key: "{{ element.image }}"
                operator: EndsWith
                value: ":latest"